steps:
  # Build dashboard
  - name: 'node:20'
    dir: 'dashboard'
    entrypoint: 'bash'
    args:
      - '-c'
      - 'npm ci && npm run build'

  # Upload to GCS
  - name: 'gcr.io/cloud-builders/gsutil'
    args:
      - '-m'
      - 'rsync'
      - '-r'
      - '-d'
      - 'dashboard/dist'
      - 'gs://${PROJECT_ID}-dashboard/'

timeout: 300s
