# NL2Bot Hardware Specifications
# Central config for all physical dimensions, electrical specs, and tunable parameters.
# Consumed by: OpenSCAD (via JSON export), Python servers, Flutter app, ESP32 firmware codegen.
# NEVER hardcode these values in source — always reference this file.

# ============================================================
# Printer Constraints (Bambu Lab A1 Mini)
# ============================================================
printer:
  name: "Bambu Lab A1 Mini"
  build_volume_mm: [180, 180, 180]
  nozzle_diameter_mm: 0.4
  layer_height_mm: 0.2
  wall_thickness_mm: 1.2          # 3 perimeters at 0.4mm
  min_wall_mm: 0.8                # 2 perimeters minimum
  tolerance_mm: 0.2               # Mating surface clearance
  material: "PLA"

# ============================================================
# Fasteners
# ============================================================
fasteners:
  m4:
    hole_diameter_mm: 4.4
    shaft_diameter_mm: 3.8
    nut_trap_width_mm: 7.8
  m3:
    hole_diameter_mm: 3.4
    standoff_od_mm: 6.0
    standoff_height_mm: 5.0
  m2_5:
    hole_diameter_mm: 2.9
    standoff_od_mm: 5.0

# ============================================================
# Tank Model — M1A1 Abrams
# ============================================================
tank:
  chassis:
    length_mm: 300
    width_mm: 140
    height_mm: 80
    track_width_mm: 25
    hull_width_mm: 90                # width - 2 * track_width
  turret:
    diameter_mm: 100
    height_mm: 50
    barrel_diameter_mm: 12
    barrel_length_mm: 120
  console:
    width_mm: 270
    depth_mm: 180
    height_mm: 80                    # Increased from 60 for network hub
  wifi:
    ssid: "TANK_CTRL"
    password: "tank1234"
    channel: 1
    hull_ip: "192.168.4.1"
    turret_ip: "192.168.4.2"
  motors:
    type: "N20 Gearmotor"             # 4-pack DC 3-6V with full metal gearbox (B0FX3K4HQ5)
    body_diameter_mm: 12
    body_length_mm: 25                # Including gearbox
    shaft_diameter_mm: 3
    shaft_flat: true                  # D-flat for sprocket coupling
    voltage_range: "3V-6V"
    driver: "L9110S"                  # Dual channel, screw terminals for motor, Dupont for logic
    driver_dimensions_mm: [29, 23, 15]
    pwm_freq_hz: 5000
    pwm_resolution_bits: 8
  imu:
    type: "MPU-6050"
    dimensions_mm: [21, 16, 3]
    mount_spacing_mm: [15.2, 12.5]     # M2.5 hole spacing
    placement: "geometric_center"       # Must be at hull center for accurate readings
    snap_fit: true                     # Screw-less snap-fit clip (vibration-proof)
  hull_pin_map:
    # SD card interface DISABLED to free GPIO 12-15
    # Camera uses: GPIO 0,5,18,19,21,22,23,25,26,27,32,34,35,36,39
    motor_a_ia: 12                     # L9110S A-IA (PWM via LEDC)
    motor_a_ib: 13                     # L9110S A-IB (PWM via LEDC)
    motor_b_ia: 2                      # L9110S B-IA — CAUTION: must be LOW at boot, add 10K pull-down
    motor_b_ib: 4                      # L9110S B-IB — flash LED pin, safe with SD disabled
    i2c_scl: 14                        # MPU-6050 SCL (with 4.7K pull-up)
    i2c_sda: 15                        # MPU-6050 SDA (with 4.7K pull-up)
  solderless:
    motor_to_driver: "N20 motor leads (pre-soldered wires) -> L9110S screw terminals"
    driver_to_mcu: "Dupont female-female jumpers -> ESP32-CAM pin headers"
    imu_to_mcu: "Dupont female-female jumpers (4 wires: VCC, GND, SCL, SDA)"
    power: "WAGO 221-413 (3-way) for 7.4V (18650 2S) -> L9110S VCC + ESP32-CAM 5V"
  camera:
    frame_size: "VGA"               # 640x480
    jpeg_quality: 12                # 0-63, lower = better
    http_port: 80
    stream_port: 81
  fcs:
    ball_speed_ms: 15.0
    hop_up_rpm: 3000.0
    ball_mass_grams: 3.0
    ball_diameter_mm: 40.0
    max_barrel_elevation_deg: 45
    min_barrel_elevation_deg: -10
    turret_angle_range_deg: 360

# ============================================================
# Train Model — Shinkansen N700 (Plarail Compatible)
# ============================================================
train:
  plarail:
    track_gauge_mm: 27              # Rail-to-rail inner distance
    overall_track_width_mm: 40
    wheel_diameter_mm: 10
    wheel_spacing_mm: 30            # Center-to-center
  body:
    width_mm: 36
    length_mm: 130
    height_mm: 30
    nose_length_mm: 25
    wall_thickness_mm: 1.2
  wifi:
    ssid: "TRAIN_CTRL"
    password: "train1234"
    ip: "192.168.4.1"
  motors:
    type: "N20"
    driver: "DRV8833"
    driver_dimensions_mm: [17.8, 17.8, 4]
    driver_mount_spacing_mm: 12
    pwm_freq_hz: 5000
    pwm_resolution_bits: 8
  camera:
    tilt_angle_deg: -10             # Slight downward tilt
    frame_size: "VGA"
    jpeg_quality: 12
    http_port: 80
    stream_port: 81

# ============================================================
# Electronic Components — Physical Dimensions
# ============================================================
components:
  esp32_devkit_v4:
    dimensions_mm: [55, 28, 13]
    pin_drop_mm: 8
  terminal_shield:
    dimensions_mm: [85, 65, 20]
    mount_pattern_mm: [76, 56]
  esp32_cam:
    dimensions_mm: [40, 27, 12]
    lens_protrude_mm: 4
    lens_diameter_mm: 8
    mb_programmer_stack_height_mm: 25  # CAM 12mm + headers 8.5mm + MB 4mm
  l9110s:
    dimensions_mm: [29, 23, 15]
    mount_spacing_mm: 22              # 2x M2.5 standoffs
    screw_terminals: 2                # Motor A, Motor B
    logic_input: "Dupont jumpers"
  lm2596:
    dimensions_mm: [43, 21, 14]
    mount_spacing_mm: 35
  battery_holder_2cell:
    dimensions_mm: [77, 41, 20]
  battery_holder_1cell:
    dimensions_mm: [77, 21, 20]
  n20_motor:
    body_diameter_mm: 12
    body_length_mm: 25
    shaft_diameter_mm: 3
    shaft_length_mm: 10
    flat_depth_mm: 0.5
  mpu6050:
    dimensions_mm: [21, 16, 3]
    mount_hole_spacing_mm: [15.2, 12.5]  # M2.5 holes
    mount_hole_diameter_mm: 2.9
    i2c_address: "0x68"                   # Default (AD0=LOW)
    vcc: 3.3                              # Volts
  vl53l1x:
    dimensions_mm: [13, 18, 4]
    aperture_diameter_mm: 3
  wago_221_415:
    dimensions_mm: [20, 13, 16]
  drv8833:
    dimensions_mm: [17.8, 17.8, 4]
    mount_spacing_mm: 12
  mcp3008:
    dimensions_mm: [40, 20, 8]
  glinet_mt300n:
    dimensions_mm: [58, 58, 25]
  tplink_wr802n:
    dimensions_mm: [57, 57, 18]
    weight_g: 32
    power_source: "sabrent_hub_port_2"  # Micro-USB powered via hub, NOT directly from powerbank
  anker_slim_10000:
    dimensions_mm: [149, 68, 14]
  sabrent_hub_um43:
    dimensions_mm: [85, 30, 15]
  ugreen_revodok_105:
    dimensions_mm: [121.8, 27.5, 12]
    weight_g: 55
    cable_length_mm: 240
    ports: "1x USB-C PD (100W), 2x USB-A 2.0, 1x USB-A 3.0, 1x HDMI"
  sjjx_822b_encoder:
    dimensions_mm: [95, 35, 10]
    interface: "USB HID gamepad"
    inputs: "joystick 5-pin, button 2-pin (4.8mm)"
  ps2_thumbstick_module:
    dimensions_mm: [34, 26, 32]
    pins: 5
    mount_holes: "4x M4"
    analog_axes: 2
    button: 1
  sanwa_24mm_button:
    diameter_mm: 24
    depth_mm: 20
    mount_type: "snap-in"
  slide_pot_100mm:
    dimensions_mm: [128, 18, 16]       # Bourns-style 100mm travel
    travel_mm: 100
    resistance_ohm: 10000
    mount: "PCB through-hole or screw"
  iuniker_usbc_switch:
    housing_mm: [80, 40, 20]           # Inline switch housing
    cable_length_mm: 270
    type: "USB-C power on/off toggle"
  ps2_joystick:
    dimensions_mm: [40, 40, 32]
    pcb_height_mm: 10
    stick_diameter_mm: 15
    mount_spacing_mm: 33
  raspberry_pi_4b:
    dimensions_mm: [85, 56, 17]
    mount_pattern_mm: [58, 49]
    ram_gb: 4
  rpi_display_7in:
    dimensions_mm: [194, 110, 20]
    mount_pattern_mm: [180, 96]
    resolution: [800, 480]

# ============================================================
# Console Stations
# ============================================================
consoles:
  tank_cradle:
    tablet:
      model: "Galaxy Tab A 8.0 with S Pen (SM-P200)"
      dimensions_mm: [201.5, 122.4, 8.9]
      connector: "USB Type-C"
      viewing_angle_deg: 15
      s_pen_clearance_mm: 15          # Bottom-right notch for S-Pen removal
    controls:
      joysticks: 2                     # PS2 thumbstick modules (left + right grip)
      buttons: 4                       # Sanwa 24mm snap-in (A, B, X, Y)
      encoder: "sjjx_822b_encoder"     # USB HID arcade encoder
      layout: "handheld_gamepad"       # Tablet center, grips left/right
    power_architecture:
      circuit_a: "PowerBank USB-C PD -> UGREEN Revodok 105 PD-IN -> Tablet (host)"
      circuit_b: "Encoder USB -> UGREEN Revodok 105 USB-A -> Tablet reads HID"
      circuit_c: "PowerBank USB-A IQ -> Inline Toggle Switch -> TP-Link Router"
      isolation: "Circuit C switchable without interrupting A/B"
    network_hub:
      router: "tplink_wr802n"
      power_bank: "anker_slim_10000"
      usb_hub: "ugreen_revodok_105"
  train_console:
    display: "rpi_display_7in"
    computer: "raspberry_pi_4b"
    rpi4_heatsink_height_mm: 5         # Active cooling heatsink on top of board
    display_tilt_deg: 20               # Eye-level for a child at desk
    controls:
      joystick: "ps2_thumbstick_module"  # Same as tank cradle (left panel)
      throttle: "slide_pot_100mm"        # Vertical slide (right panel)
      buttons: 4                         # Sanwa 24mm (horn, doors, lights, emergency)
      encoder: "sjjx_822b_encoder"       # USB HID (same as tank cradle)
    adc: "mcp3008"                       # SPI to RPi4 for analog inputs
    power:
      battery: "anker_slim_10000"
      switch: "iuniker_usbc_switch"      # Externally accessible on/off
    structural:
      wall_mm: 3.0                       # Extra sturdy for desk use
      fillet_mm: 1.5
      floor_mm: 2.5
    dimensions_mm: [220, 140, 50]

# ============================================================
# RPi4 Console Network
# ============================================================
rpi_console:
  hotspot:
    ssid: "TRAIN_CONSOLE"
    password: "console1234"
    ip: "192.168.5.1"
    subnet: "255.255.255.0"
    dhcp_start: "192.168.5.10"
    dhcp_end: "192.168.5.50"

# ============================================================
# Hull ESP32-CAM Pin Map
# ============================================================
hull_pin_map:
  motor_a_ia: GPIO12  # L9110S A-IA (PWM)
  motor_a_ib: GPIO13  # L9110S A-IB (PWM)
  motor_b_ia: GPIO14  # L9110S B-IA (PWM)
  motor_b_ib: GPIO15  # L9110S B-IB (PWM)
  # NOTE: SD card interface DISABLED in firmware to free GPIO 12-15
  # Camera uses: GPIO 0,5,18,19,21,22,23,25,26,27,32,34,35,36,39
  # Serial: GPIO 1 (TX), 3 (RX) — used for debug only
  # Flash LED: GPIO 4 — available when SD disabled

# ============================================================
# Solderless Connection Strategy
# ============================================================
solderless_connections:
  motor_to_driver: "2.8mm spade terminals on TT motor → L9110S screw terminals"
  driver_to_mcu: "Dupont female-female jumpers → ESP32-CAM pin headers"
  power_distribution: "WAGO 221-413 (3-way) for 7.4V battery → L9110S VCC + ESP32-CAM 5V"
  signal_routing: "Separate channel from power wires (EMI reduction)"

# ============================================================
# Wiring & Clearances
# ============================================================
wiring:
  dupont_clearance_mm: 20           # Vertical clearance above pin headers
  ghost_alpha: 0.15                 # Visualization translucency
  cable_channel_width_mm: 10
  cable_channel_depth_mm: 8
  zip_tie_width_mm: 4

# ============================================================
# Server Configuration
# ============================================================
servers:
  planning:
    port: 8000
    host: "0.0.0.0"
  simulation:
    port: 8100
    host: "0.0.0.0"

# ============================================================
# Pipeline Settings
# ============================================================
pipeline:
  max_refinement_iterations: 2
  simulation_timeout_seconds: 30
  refinement_score_threshold: 0.8
