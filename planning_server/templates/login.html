{% extends "base.html" %}
{% block title %}NL2Bot — Login{% endblock %}
{% block content %}
<div class="auth-container" x-data="authForm()">
    <div class="auth-card">
        <h2 x-text="isRegister ? 'Register' : 'Login'"></h2>

        <div x-show="message" class="alert" :class="messageType" x-text="message"></div>

        <form @submit.prevent="submit()">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" x-model="username" required minlength="3">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" x-model="password" required minlength="6">
            </div>
            <button type="submit" class="btn btn-primary btn-block" :disabled="loading">
                <span x-text="loading ? 'Please wait...' : (isRegister ? 'Register' : 'Login')"></span>
            </button>
        </form>

        <p class="auth-toggle">
            <span x-text="isRegister ? 'Already have an account?' : 'Need an account?'"></span>
            <a href="#" @click.prevent="isRegister = !isRegister"
               x-text="isRegister ? 'Login' : 'Register'"></a>
        </p>
    </div>
</div>

<script>
function authForm() {
    return {
        isRegister: false,
        username: '',
        password: '',
        loading: false,
        message: '',
        messageType: 'alert-info',

        async submit() {
            this.loading = true;
            this.message = '';

            try {
                if (this.isRegister) {
                    const res = await fetch('/api/v1/auth/register', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ username: this.username, password: this.password })
                    });
                    const data = await res.json();
                    if (res.ok) {
                        this.message = 'Registered! Waiting for admin approval.';
                        this.messageType = 'alert-success';
                    } else {
                        this.message = data.detail || 'Registration failed';
                        this.messageType = 'alert-error';
                    }
                } else {
                    const formData = new FormData();
                    formData.append('username', this.username);
                    formData.append('password', this.password);

                    const res = await fetch('/api/v1/auth/login', {
                        method: 'POST',
                        body: formData
                    });
                    const data = await res.json();
                    if (res.ok) {
                        localStorage.setItem('token', data.access_token);
                        localStorage.setItem('refresh_token', data.refresh_token);
                        window.location.href = '/dashboard';
                    } else {
                        this.message = data.detail || 'Login failed';
                        this.messageType = 'alert-error';
                    }
                }
            } catch (e) {
                this.message = 'Connection error: ' + e.message;
                this.messageType = 'alert-error';
            }
            this.loading = false;
        }
    };
}
</script>
{% endblock %}
