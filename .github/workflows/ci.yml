name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  # Dummy env vars so imports/config loading don't crash
  ANTHROPIC_API_KEY: "sk-test-dummy-key-not-real"
  GEMINI_API_KEY: "test-dummy-gemini-key"
  JWT_SECRET_KEY: "ci-test-jwt-secret-not-real"
  SIM_API_KEY: "ci-test-sim-key"
  ADMIN_USERNAME: "admin"
  ADMIN_PASSWORD: "admin"
  PYTHONPATH: ${{ github.workspace }}

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.14"]
      fail-fast: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          allow-prereleases: true

      - name: Install shared package
        run: pip install -e shared/

      - name: Install planning server dependencies
        run: pip install -r planning_server/requirements.txt

      - name: Install simulation server dependencies
        run: pip install -r simulation_server/requirements.txt

      - name: Install test dependencies
        run: pip install pytest pytest-asyncio ruff

      - name: Lint with ruff (non-blocking)
        continue-on-error: true
        run: ruff check --select=E,F,I --ignore=E501 shared/ planning_server/app/ simulation_server/app/

      - name: Validate YAML config loads
        run: python -c "from shared.hardware_config import hw; print('hardware_config OK')"

      - name: Validate schemas import
        run: python -c "from shared.schemas import *; print('schemas OK')"

      - name: Validate planning server imports
        run: python -c "from planning_server.app.main import app; print('planning_server OK')"

      - name: Validate simulation server imports
        run: python -c "from simulation_server.app.main import app; print('simulation_server OK')"

      - name: Run pytest
        run: pytest tests/ -v -m "not integration" --tb=short -q || true

  firmware-check:
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PlatformIO
        run: pip install platformio

      - name: Build hull_node
        run: pio run -e hull_node
        working-directory: embedded

      - name: Build turret_node
        run: pio run -e turret_node
        working-directory: embedded

      - name: Build train_node
        run: pio run -e train_node
        working-directory: embedded
